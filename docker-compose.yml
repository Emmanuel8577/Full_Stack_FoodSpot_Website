services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file: ./backend/.env
    
  frontend:
    build: ./frontend
    ports:
      - "5173:80" # Maps local port 5173 to Nginx port 80
    depends_on:
      - backend

  admin:
    build: ./admin
    ports:
      - "5174:80" # Maps local port 5174 to Nginx port 80
    depends_on:
      - backend